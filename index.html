
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Advanced Project</title>
    <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
    <div id="app">

    <header>
    <div class="header-container">
        <div class="logo-section">
            <a href="#" id="logo-link">
            <h1 class="brand-title">
                <span class="otaku">OTAKU</span>
                <span class="archive">ARCHIVE</span>
            </h1>
            </a>
        </div>

        <nav class="header-nav">
                <a href="#" id="home-link">Startpagina</a>
                <a href="#" id="manga-link">Manga</a>
                <a href="#" id="movie-link">Movies</a>
                <a href="#" id="show-link">Shows</a>
                <a href="#" id="top-link">Top Anime</a>
        </nav>

        <div class="controls-section">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Zoek je volgende avontuur...">
                <button id="search-btn">ZOEK</button>
            </div>
            <div class="action-buttons">
                <button id="filter-btn">Filters</button>
                <button id="fav-list-btn">❤ Mijn Favorieten</button>
            </div>
        </div>
    </div>
</header>

    <!--Filter-->
    <div id="filter-modal" class="filter-modal">
    <div class="filter-modal-content">
        <div class="filter-header">
            <h3>Filters</h3>
            <span id="close-filter">&times;</span>
        </div>

        <div class="filter-groep">
            <h4>Type</h4>
            <label><input type="checkbox" value="TV"> TV</label>
            <label><input type="checkbox" value="Movie"> Movie</label>
            <label><input type="checkbox" value="OVA"> OVA</label>
            <label><input type="checkbox" value="Special"> Special</label>
        </div>

        <div class="filter-groep">
            <h4>Status</h4>
            <label><input type="checkbox" value="Airing"> Airing</label>
            <label><input type="checkbox" value="Finished Airing"> Finished</label>
            <label><input type="checkbox" value="Not yet aired"> Upcoming</label>
        </div>

        <div class="filter-groep">
            <h4>Minimum Score</h4>
            <label><input type="checkbox" value="7"> 7+</label>
            <label><input type="checkbox" value="8"> 8+</label>
            <label><input type="checkbox" value="9"> 9+</label>
        </div>

        <div class="filter-groep">
            <h4>Genre</h4>
            <label><input type="checkbox" value="Action"> Action</label>
            <label><input type="checkbox" value="Comedy"> Comedy</label>
            <label><input type="checkbox" value="Romance"> Romance</label>
            <label><input type="checkbox" value="Drama"> Drama</label>
            <label><input type="checkbox" value="Fantasy"> Fantasy</label>
        </div>

        <button id="pas-filter-toe">Toepassen</button>
        <button id="reset-filter">Reset</button>

    </div>
    </div>

    <!--Sorteer-->
    <div class="sorteer-balk">
    <label for="sorteer-select">Sorteren op:</label>
    <select id="sorteer-select">
        <option value="standaard">Standaard</option>
        <option value="score-hoog">Score hoog → laag</option>
        <option value="score-laag">Score laag → hoog</option>
        <option value="titel-az">Titel A → Z</option>
        <option value="titel-za">Titel Z → A</option>
    </select>

    <button id="thema-btn">☾ Dark Mode</button>

    </div>
        
    <!--KAARTEN-->
    <main id="anime-list">
           
    </main>
    </div>

    <div id="anime-modal" class="modal">
     <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modal-details">
            </div>
     </div>
    </div>

    <script type="module" src="./src/js/main.js"></script>
</body>
</html>
